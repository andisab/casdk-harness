# CGF Run Configuration Template
# Generated by cgf-orchestrator during INIT phase

# Resource being optimized
resource:
  path: "{resource_path}"           # Path to resource definition file
  type: "{resource_type}"           # agent | skill | command | mcp | workflow | spec | hook | plugin
  id: "{resource_id}"               # Resource identifier (e.g., agent name)
  optimization_goal: "{goal}"       # User-specified objective

# Optimization strategy (auto-detected based on resource type)
# - agent: prompt_optimization (system prompt)
# - skill: trigger_optimization (trigger keywords, instructions)
# - command: schema_optimization (argument handling, help text)
# - workflow: workflow_optimization (steps, hand-offs)
strategy: "{strategy}"

# Optimization parameters
options:
  max_iterations: 10                # Maximum optimization iterations
  review_mode: false                # Enable checkpoint pauses for review

# Workspace configuration
workspace: "workspace/{resource_id}/"

# Paths to artifacts (populated during execution)
artifacts:
  original_resource: null           # Preserved original
  eval_criteria: null               # Synthesized criteria from research
  test_suite: null                  # Generated or provided test suite
  coverage_report: null             # Test coverage analysis
  optimized_resource: null          # Final optimized version
  summary: null                     # Optimization summary JSON
  review_report: null               # Evaluation report

# Metadata
metadata:
  created_by: "cgf-orchestrator"
  created_at: "{timestamp}"
  run_id: "{run_id}"
