# Prometheus Configuration for Claude Agent SDK Harness

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'claude-harness'
    environment: 'development'

# Scrape configurations
scrape_configs:
  # Main Agent
  - job_name: 'main-agent'
    static_configs:
      - targets: ['main-agent:9090']
        labels:
          agent: 'main'
          role: 'development'

  # Agent Two (Default: Evaluator)
  - job_name: 'agent-two'
    static_configs:
      - targets: ['agent-two:9090']
        labels:
          agent: 'agent-two'
          role: 'evaluator'

  # Agent Three (Default: Validator)
  - job_name: 'agent-three'
    static_configs:
      - targets: ['agent-three:9090']
        labels:
          agent: 'agent-three'
          role: 'validator'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
        labels:
          service: 'database'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
        labels:
          service: 'cache'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
