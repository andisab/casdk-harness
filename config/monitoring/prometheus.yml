# Prometheus Configuration for Claude Agent SDK Harness

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'claude-harness'
    environment: 'development'

# Scrape configurations
scrape_configs:
  # Main Agent
  - job_name: 'main-agent'
    static_configs:
      - targets: ['main-agent:9090']
        labels:
          agent: 'main'
          role: 'development'

  # Agent Two (Default: Evaluator)
  - job_name: 'agent-two'
    static_configs:
      - targets: ['agent-two:9090']
        labels:
          agent: 'agent-two'
          role: 'evaluator'

  # Agent Three (Default: Validator)
  - job_name: 'agent-three'
    static_configs:
      - targets: ['agent-three:9090']
        labels:
          agent: 'agent-three'
          role: 'validator'

  # OpenTelemetry Collector — SDK-emitted metrics (claude_sdk_* namespace).
  # The collector receives OTLP from agents and exposes them on :8889 for scrape.
  - job_name: 'otel-collector-sdk'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          source: 'claude-sdk-harness'

  # OpenTelemetry Collector self-metrics (collector internals + pipeline health).
  - job_name: 'otel-collector-self'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          source: 'claude-sdk-harness-collector'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
