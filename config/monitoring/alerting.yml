# Alert Rules for Claude Agent SDK Harness
#
# Rule conventions:
#   - Harness-specific metrics use the `harness_` prefix.
#   - SDK-emitted metrics use the `claude_code_` prefix (via the OTel collector).
#   - All thresholds are dev-friendly defaults; tune per environment.

groups:
  - name: agent_alerts
    interval: 30s
    rules:
      # High error rate (harness-tracked agent requests)
      - alert: HighErrorRate
        expr: |
          rate(harness_agent_requests_total{status="error"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected for {{ $labels.agent }}"
          description: "Agent {{ $labels.agent }} has error rate above 5% (current: {{ $value }})"

      # Slow response time (harness agent duration)
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95, rate(harness_agent_duration_seconds_bucket[5m])) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time for {{ $labels.agent }}"
          description: "95th percentile response time is {{ $value }}s (threshold: 30s)"

      # No active sessions (when expected)
      - alert: NoActiveSessions
        expr: |
          harness_agent_active_sessions == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "No active sessions for {{ $labels.agent }}"
          description: "Agent {{ $labels.agent }} has no active sessions for 15 minutes"

  - name: resource_alerts
    interval: 30s
    rules:
      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          harness_memory_usage_bytes > 7000000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage for {{ $labels.component }}"
          description: "Memory usage is {{ $value | humanize }}B (threshold: 7GB)"

      # Large checkpoint files
      - alert: LargeCheckpointSize
        expr: |
          harness_checkpoint_size_bytes > 1000000000
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Checkpoint size is large"
          description: "Total checkpoint size is {{ $value | humanize }}B (threshold: 1GB)"

      # Disk space low (workspace)
      - alert: WorkspaceFilesHigh
        expr: |
          harness_workspace_files_total > 10000
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "High file count in workspace"
          description: "Workspace contains {{ $value }} files (threshold: 10,000)"

  - name: cost_alerts
    interval: 1h
    rules:
      # High API costs — uses SDK-emitted cost counter (segmented by model)
      - alert: HighAPICost
        expr: |
          sum(rate(claude_code_cost_usage_USD_total[1h])) * 3600 > 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High API costs detected"
          description: "API cost is ${{ $value }}/hour (threshold: $10/hour)"

      # High token usage — uses SDK-emitted token counter (segmented by model + type + query_source)
      - alert: HighTokenUsage
        expr: |
          sum by (model) (rate(claude_code_token_usage_tokens_total[1h])) * 3600 > 1000000
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "High token usage for {{ $labels.model }}"
          description: "Using {{ $value }} tokens/hour (threshold: 1M tokens/hour)"

      # Cost spike — large 1-hour increase above the standing HighAPICost rate.
      # Static threshold of $30 in any rolling hour; treat as ~3× the typical
      # operational rate and tune to your environment. PromQL doesn't offer
      # easy historical-P95 baselining, so this is intentionally a hard cap.
      - alert: CostSpike
        expr: |
          sum(increase(claude_code_cost_usage_USD_total[1h])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API cost spiked in the last hour"
          description: "Cost increased by ${{ $value | printf \"%.2f\" }} in 1h (threshold: $30). Investigate runaway model/effort settings."

      # Cache hit rate degradation — healthy long sessions sit at ≥90%;
      # <60% sustained means the cache is busted each turn (timestamps in
      # CLAUDE.md, mid-session model switches, MCP additions, capitalization
      # drift in stable prefixes).  Only fires when there's actual token
      # traffic in the denominator.
      - alert: CacheHitRateDegraded
        expr: |
          (
            sum(rate(claude_code_token_usage_tokens_total{type="cacheRead"}[5m]))
            /
            sum(rate(claude_code_token_usage_tokens_total{type=~"cacheRead|cacheCreation|input"}[5m]))
          ) < 0.6
          and
          sum(rate(claude_code_token_usage_tokens_total{type=~"cacheRead|cacheCreation|input"}[5m])) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below 60% for 30+ minutes"
          description: "Cache hit rate is {{ $value | humanizePercentage }}. Healthy long sessions sit at ≥90%. Inspect CLAUDE.md for volatile content; check for mid-session /model switches."

      # Token burn — catastrophic generation rate. The standing HighTokenUsage
      # rule fires at 1M tok/h (≈278 tok/s); this rule fires at 100k tok/s
      # sustained for 10m, which would consume the daily budget in minutes.
      - alert: TokenBurnSustained
        expr: |
          sum(rate(claude_code_token_usage_tokens_total[5m])) > 100000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Token burn rate above 100k tok/s for 10+ minutes"
          description: "Generating {{ $value | humanize }} tok/s. Likely a runaway agent loop. Investigate before budget impact compounds."

      # DEFERRED — Sustained retry exhaustion alert from spec § 9.1.
      # Requires the SDK's `api_retries_exhausted` event, which only flows
      # through OTLP logs.  Until Loki (Stage 3) lands, terminal API
      # failures are approximated by the standing HighErrorRate rule
      # (agent_alerts group) which fires on harness_agent_requests_total
      # {status="error"}.  Restore this alert when Loki is wired:
      #
      # - alert: SustainedRetryExhaustion
      #   expr: |
      #     sum(rate({service_name="claude-code"} | json
      #              | event_name="api_retries_exhausted" [5m])) > 0
      #   for: 10m
      #   labels:
      #     severity: critical
      #   annotations:
      #     summary: "API retries exhausted — terminal failures sustained"
      #     description: "Anthropic-side incident or rate limit. Check status.anthropic.com."

  - name: pipeline_alerts
    interval: 30s
    rules:
      # OTel collector down — pipeline broken, no SDK metrics flowing
      - alert: OTelCollectorDown
        expr: |
          up{job="otel-collector-self"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "OpenTelemetry Collector is down"
          description: "Collector has been unreachable for 2m. SDK telemetry (claude_code_*) is not flowing into Prometheus."

      # AlertManager down — no alerts can fire
      - alert: AlertManagerDown
        expr: |
          absent(up{job="alertmanager"}) or up{job="alertmanager"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AlertManager is down"
          description: "Prometheus cannot deliver alerts."
