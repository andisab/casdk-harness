# =============================================================================
# Claude Agent SDK Harness - Base Configuration
# =============================================================================
# Use with: docker compose up                     (main-agent + monitoring only)
# Multi-agent: docker compose --profile multi-agent up (all agents + redis)
# Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Profiles:
#   - (default): main-agent + prometheus + grafana
#   - multi-agent: adds agent-two (evaluator), agent-three (validator), redis

services:
  # ===========================================================================
  # Main Development Agent
  # ===========================================================================
  main-agent:
    build:
      context: .
      dockerfile: agents/main/Dockerfile
      target: ${BUILD_TARGET:-development}
      cache_from:
        - ${REGISTRY:-ghcr.io/andisab/claudeagentsdk-harness}/main:cache
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    image: ${REGISTRY:-claudeagentsdk-harness}/main:${IMAGE_TAG:-latest}
    container_name: claude-main-agent
    hostname: main-agent
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_PERMISSION_MODE=${CLAUDE_PERMISSION_MODE:-acceptEdits}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-1000}
      - CLAUDE_SESSION_TIMEOUT=${CLAUDE_SESSION_TIMEOUT:-72000}
      - CLAUDE_CHECKPOINT_INTERVAL=${CLAUDE_CHECKPOINT_INTERVAL:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-}
      - SWE_MARKETPLACE_PATH=${SWE_MARKETPLACE_PATH:-}
      - SWE_MARKETPLACE_REF=${SWE_MARKETPLACE_REF:-}
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude-plugin:/app/.claude-plugin:ro
      - ./memory:/memory:delegated
      - ./logs/main:/logs:delegated
      - ./config:/app/config:ro
      - ./.ssh:/home/claude/.ssh:ro
      - ./.ssh/netrc:/home/claude/.netrc:ro
    ports:
      - "${MAIN_AGENT_PORT:-8080}:8080"
      - "${MAIN_METRICS_PORT:-9091}:9090"  # Prometheus metrics
    # Note: Redis dependency removed - main-agent gracefully handles Redis unavailability
    # When running with --profile multi-agent, Redis will be available
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - claude-network
    # Process-based healthcheck works for both interactive and batch modes
    # (unlike HTTP healthcheck which only works when server is running)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python|tail' || test -f /tmp/.healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: ${AGENT_CPU_LIMIT:-4}
          memory: ${AGENT_MEMORY_LIMIT:-8G}
        reservations:
          cpus: ${AGENT_CPU_RESERVATION:-2}
          memory: ${AGENT_MEMORY_RESERVATION:-4G}
  # ===========================================================================
  # Agent Two (multi-agent profile) - Generic secondary agent
  # Default role: Evaluator (quality scoring, code review)
  # ===========================================================================
  agent-two:
    profiles: ["multi-agent"]
    build:
      context: .
      dockerfile: agents/main/Dockerfile
      target: ${BUILD_TARGET:-development}
      cache_from:
        - ${REGISTRY:-ghcr.io/andisab/claudeagentsdk-harness}/main:cache
    image: ${REGISTRY:-claudeagentsdk-harness}/agent-two:${IMAGE_TAG:-latest}
    container_name: claude-agent-two
    hostname: agent-two
    environment:
      - AGENT_NAME=agent-two
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_PERMISSION_MODE=default
      - CLAUDE_MAX_TURNS=50
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-}
      - SWE_MARKETPLACE_PATH=${SWE_MARKETPLACE_PATH:-}
      - SWE_MARKETPLACE_REF=${SWE_MARKETPLACE_REF:-}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./workspace:/workspace:ro
      - ./.claude-plugin:/app/.claude-plugin:ro
      - ./memory:/memory:delegated
      - ./logs/agent-two:/logs:delegated
      - ./config:/app/config:ro
      - ./.ssh:/home/claude/.ssh:ro
      - ./.ssh/netrc:/home/claude/.netrc:ro
    ports:
      - "${AGENT_TWO_PORT:-8081}:8080"
      - "${AGENT_TWO_METRICS_PORT:-9092}:9090"  # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - claude-network
    deploy:
      resources:
        limits:
          cpus: ${AGENT_TWO_CPU_LIMIT:-2}
          memory: ${AGENT_TWO_MEMORY_LIMIT:-4G}

  # ===========================================================================
  # Agent Three (multi-agent profile) - Generic tertiary agent
  # Default role: Validator (test execution, correctness verification)
  # ===========================================================================
  agent-three:
    profiles: ["multi-agent"]
    build:
      context: .
      dockerfile: agents/main/Dockerfile
      target: ${BUILD_TARGET:-development}
      cache_from:
        - ${REGISTRY:-ghcr.io/andisab/claudeagentsdk-harness}/main:cache
    image: ${REGISTRY:-claudeagentsdk-harness}/agent-three:${IMAGE_TAG:-latest}
    container_name: claude-agent-three
    hostname: agent-three
    environment:
      - AGENT_NAME=agent-three
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_PERMISSION_MODE=bypassPermissions
      - CLAUDE_MAX_TURNS=100
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-}
      - SWE_MARKETPLACE_PATH=${SWE_MARKETPLACE_PATH:-}
      - SWE_MARKETPLACE_REF=${SWE_MARKETPLACE_REF:-}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude-plugin:/app/.claude-plugin:ro
      - ./memory:/memory:delegated
      - ./logs/agent-three:/logs:delegated
      - ./config:/app/config:ro
      - ./.ssh:/home/claude/.ssh:ro
      - ./.ssh/netrc:/home/claude/.netrc:ro
    ports:
      - "${AGENT_THREE_PORT:-8082}:8080"
      - "${AGENT_THREE_METRICS_PORT:-9093}:9090"  # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - claude-network
    deploy:
      resources:
        limits:
          cpus: ${AGENT_THREE_CPU_LIMIT:-2}
          memory: ${AGENT_THREE_MEMORY_LIMIT:-4G}

  # ===========================================================================
  # Redis Cache & Pub/Sub (multi-agent profile)
  # ===========================================================================
  redis:
    profiles: ["multi-agent"]
    image: redis:7-alpine
    container_name: claude-redis
    hostname: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # Prometheus Monitoring
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: claude-prometheus
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Grafana Dashboards
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: claude-grafana
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_PORT:-3000}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./config/monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/monitoring/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
