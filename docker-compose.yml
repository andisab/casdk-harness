# =============================================================================
# Claude Agent SDK Harness - Base Configuration
# =============================================================================
# Use with: docker compose up                     (main-agent + monitoring only)
# Multi-agent: docker compose --profile multi-agent up (all agents + redis)
# Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Profiles:
#   - (default): main-agent + prometheus + grafana
#   - multi-agent: adds agent-two (evaluator), agent-three (validator), redis

services:
  # ===========================================================================
  # Main Development Agent
  # ===========================================================================
  main-agent:
    build:
      context: .
      dockerfile: agents/main/Dockerfile
      target: ${BUILD_TARGET:-development}
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    image: ${REGISTRY:-claudeagentsdk-harness}/main:${IMAGE_TAG:-latest}
    container_name: claude-main-agent
    hostname: main-agent
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_PERMISSION_MODE=${CLAUDE_PERMISSION_MODE:-acceptEdits}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-1000}
      - CLAUDE_SESSION_TIMEOUT=${CLAUDE_SESSION_TIMEOUT:-72000}
      - CLAUDE_CHECKPOINT_INTERVAL=${CLAUDE_CHECKPOINT_INTERVAL:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-}
      - SWE_MARKETPLACE_PATH=${SWE_MARKETPLACE_PATH:-}
      - SWE_MARKETPLACE_REF=${SWE_MARKETPLACE_REF:-}
      # CGF Stage 3 — eval framework (Phase A.6).  Listed explicitly per
      # the env-passthrough gotcha: vars not enumerated here NEVER reach
      # the container even if set in .env.
      - CGF_DESIGN_MODEL=${CGF_DESIGN_MODEL:-sonnet}
      - CGF_JUDGE_MODEL=${CGF_JUDGE_MODEL:-opus}
      - CGF_EVAL_TOKEN_BUDGET=${CGF_EVAL_TOKEN_BUDGET:-1000000}
      - CGF_EVAL_PROMOTION_EPSILON=${CGF_EVAL_PROMOTION_EPSILON:-0.0}
      - CGF_TOKEN_REGRESSION_TOLERANCE=${CGF_TOKEN_REGRESSION_TOLERANCE:-0.10}
      - CGF_MIN_GAIN_PER_ROUND=${CGF_MIN_GAIN_PER_ROUND:-0.02}
      - CGF_EVAL_HELD_OUT_FRACTION=${CGF_EVAL_HELD_OUT_FRACTION:-0.25}
      # Phase-1 hardening knobs (phase-a-fixes, 2026-05-11).
      - CGF_MAX_ITERATIONS=${CGF_MAX_ITERATIONS:-3}
      - CGF_BASELINE_HASH_CHECK=${CGF_BASELINE_HASH_CHECK:-1}
      - CGF_SIGNAL_STRICT=${CGF_SIGNAL_STRICT:-0}
      # OTel vars use literal values (NOT shell interpolation) so harness telemetry
      # always routes to the bundled collector regardless of what the host shell
      # has set (e.g., a global Claude Code OTLP endpoint). To redirect telemetry,
      # edit these values directly or use a docker-compose override file.
      # Both OTEL_METRICS_EXPORTER and OTEL_LOGS_EXPORTER are REQUIRED — without
      # them the Claude Code CLI silently emits nothing.
      - CLAUDE_CODE_ENABLE_TELEMETRY=1
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=10000
      # Cardinality control — drop high-cardinality labels that would create a
      # unique series per session/user. Keep model + query_source + type
      # which are the useful aggregation dimensions.
      - OTEL_METRICS_INCLUDE_SESSION_ID=false
      - OTEL_METRICS_INCLUDE_ACCOUNT_UUID=false
      - OTEL_SERVICE_NAME=casdk-harness-main
      # Pin temporality to cumulative — defensive against future SDK default
      # changes. VictoriaMetrics, Mimir, and Grafana Cloud silently drop delta
      # metrics; we use Prometheus here but the pin costs nothing.
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      # Project taxonomy for cross-repo filtering. Single-user harness skips
      # team= and cost_center= from the spec.
      - OTEL_RESOURCE_ATTRIBUTES=project=${PROJECT:-ab-casdk-harness}
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude-plugin:/app/.claude-plugin:ro
      - ./memory:/memory:delegated
      - ./logs/main:/logs:delegated
      - ./config:/app/config:ro
      - ./.ssh:/home/claude/.ssh:ro
      - ./.ssh/netrc:/home/claude/.netrc:ro
    ports:
      - "${MAIN_AGENT_PORT:-8080}:8080"
      - "${MAIN_METRICS_PORT:-9091}:9090"  # Prometheus metrics
    # Note: Redis dependency removed - main-agent gracefully handles Redis unavailability
    # When running with --profile multi-agent, Redis will be available
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - claude-network
    # Process-based healthcheck works for both interactive and batch modes
    # (unlike HTTP healthcheck which only works when server is running)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python|tail' || test -f /tmp/.healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: ${AGENT_CPU_LIMIT:-4}
          memory: ${AGENT_MEMORY_LIMIT:-8G}
        reservations:
          cpus: ${AGENT_CPU_RESERVATION:-2}
          memory: ${AGENT_MEMORY_RESERVATION:-4G}
  # ===========================================================================
  # Agent Two (multi-agent profile) - Generic secondary agent
  # Default role: Evaluator (quality scoring, code review)
  # ===========================================================================
  agent-two:
    profiles: ["multi-agent"]
    build:
      context: .
      dockerfile: agents/main/Dockerfile
      target: ${BUILD_TARGET:-development}
    image: ${REGISTRY:-claudeagentsdk-harness}/agent-two:${IMAGE_TAG:-latest}
    container_name: claude-agent-two
    hostname: agent-two
    environment:
      - AGENT_NAME=agent-two
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_PERMISSION_MODE=default
      - CLAUDE_MAX_TURNS=50
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-}
      - SWE_MARKETPLACE_PATH=${SWE_MARKETPLACE_PATH:-}
      - SWE_MARKETPLACE_REF=${SWE_MARKETPLACE_REF:-}
      # CGF Stage 3 — eval framework (Phase A.6).  Listed explicitly per
      # the env-passthrough gotcha: vars not enumerated here NEVER reach
      # the container even if set in .env.
      - CGF_DESIGN_MODEL=${CGF_DESIGN_MODEL:-sonnet}
      - CGF_JUDGE_MODEL=${CGF_JUDGE_MODEL:-opus}
      - CGF_EVAL_TOKEN_BUDGET=${CGF_EVAL_TOKEN_BUDGET:-1000000}
      - CGF_EVAL_PROMOTION_EPSILON=${CGF_EVAL_PROMOTION_EPSILON:-0.0}
      - CGF_TOKEN_REGRESSION_TOLERANCE=${CGF_TOKEN_REGRESSION_TOLERANCE:-0.10}
      - CGF_MIN_GAIN_PER_ROUND=${CGF_MIN_GAIN_PER_ROUND:-0.02}
      - CGF_EVAL_HELD_OUT_FRACTION=${CGF_EVAL_HELD_OUT_FRACTION:-0.25}
      # Phase-1 hardening knobs (phase-a-fixes, 2026-05-11).
      - CGF_MAX_ITERATIONS=${CGF_MAX_ITERATIONS:-3}
      - CGF_BASELINE_HASH_CHECK=${CGF_BASELINE_HASH_CHECK:-1}
      - CGF_SIGNAL_STRICT=${CGF_SIGNAL_STRICT:-0}
      # OTel vars use literal values (NOT shell interpolation) so harness telemetry
      # always routes to the bundled collector regardless of what the host shell
      # has set (e.g., a global Claude Code OTLP endpoint). To redirect telemetry,
      # edit these values directly or use a docker-compose override file.
      # Both OTEL_METRICS_EXPORTER and OTEL_LOGS_EXPORTER are REQUIRED — without
      # them the Claude Code CLI silently emits nothing.
      - CLAUDE_CODE_ENABLE_TELEMETRY=1
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=10000
      # Cardinality control — drop high-cardinality labels that would create a
      # unique series per session/user. Keep model + query_source + type
      # which are the useful aggregation dimensions.
      - OTEL_METRICS_INCLUDE_SESSION_ID=false
      - OTEL_METRICS_INCLUDE_ACCOUNT_UUID=false
      - OTEL_SERVICE_NAME=casdk-harness-agent-two
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=project=${PROJECT:-ab-casdk-harness}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./workspace:/workspace:ro
      - ./.claude-plugin:/app/.claude-plugin:ro
      - ./memory:/memory:delegated
      - ./logs/agent-two:/logs:delegated
      - ./config:/app/config:ro
      - ./.ssh:/home/claude/.ssh:ro
      - ./.ssh/netrc:/home/claude/.netrc:ro
    ports:
      - "${AGENT_TWO_PORT:-8081}:8080"
      - "${AGENT_TWO_METRICS_PORT:-9092}:9090"  # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - claude-network
    deploy:
      resources:
        limits:
          cpus: ${AGENT_TWO_CPU_LIMIT:-2}
          memory: ${AGENT_TWO_MEMORY_LIMIT:-4G}

  # ===========================================================================
  # Agent Three (multi-agent profile) - Generic tertiary agent
  # Default role: Validator (test execution, correctness verification)
  # ===========================================================================
  agent-three:
    profiles: ["multi-agent"]
    build:
      context: .
      dockerfile: agents/main/Dockerfile
      target: ${BUILD_TARGET:-development}
    image: ${REGISTRY:-claudeagentsdk-harness}/agent-three:${IMAGE_TAG:-latest}
    container_name: claude-agent-three
    hostname: agent-three
    environment:
      - AGENT_NAME=agent-three
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_PERMISSION_MODE=bypassPermissions
      - CLAUDE_MAX_TURNS=100
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-}
      - SWE_MARKETPLACE_PATH=${SWE_MARKETPLACE_PATH:-}
      - SWE_MARKETPLACE_REF=${SWE_MARKETPLACE_REF:-}
      # CGF Stage 3 — eval framework (Phase A.6).  Listed explicitly per
      # the env-passthrough gotcha: vars not enumerated here NEVER reach
      # the container even if set in .env.
      - CGF_DESIGN_MODEL=${CGF_DESIGN_MODEL:-sonnet}
      - CGF_JUDGE_MODEL=${CGF_JUDGE_MODEL:-opus}
      - CGF_EVAL_TOKEN_BUDGET=${CGF_EVAL_TOKEN_BUDGET:-1000000}
      - CGF_EVAL_PROMOTION_EPSILON=${CGF_EVAL_PROMOTION_EPSILON:-0.0}
      - CGF_TOKEN_REGRESSION_TOLERANCE=${CGF_TOKEN_REGRESSION_TOLERANCE:-0.10}
      - CGF_MIN_GAIN_PER_ROUND=${CGF_MIN_GAIN_PER_ROUND:-0.02}
      - CGF_EVAL_HELD_OUT_FRACTION=${CGF_EVAL_HELD_OUT_FRACTION:-0.25}
      # Phase-1 hardening knobs (phase-a-fixes, 2026-05-11).
      - CGF_MAX_ITERATIONS=${CGF_MAX_ITERATIONS:-3}
      - CGF_BASELINE_HASH_CHECK=${CGF_BASELINE_HASH_CHECK:-1}
      - CGF_SIGNAL_STRICT=${CGF_SIGNAL_STRICT:-0}
      # OTel vars use literal values (NOT shell interpolation) so harness telemetry
      # always routes to the bundled collector regardless of what the host shell
      # has set (e.g., a global Claude Code OTLP endpoint). To redirect telemetry,
      # edit these values directly or use a docker-compose override file.
      # Both OTEL_METRICS_EXPORTER and OTEL_LOGS_EXPORTER are REQUIRED — without
      # them the Claude Code CLI silently emits nothing.
      - CLAUDE_CODE_ENABLE_TELEMETRY=1
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=10000
      # Cardinality control — drop high-cardinality labels that would create a
      # unique series per session/user. Keep model + query_source + type
      # which are the useful aggregation dimensions.
      - OTEL_METRICS_INCLUDE_SESSION_ID=false
      - OTEL_METRICS_INCLUDE_ACCOUNT_UUID=false
      - OTEL_SERVICE_NAME=casdk-harness-agent-three
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=project=${PROJECT:-ab-casdk-harness}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude-plugin:/app/.claude-plugin:ro
      - ./memory:/memory:delegated
      - ./logs/agent-three:/logs:delegated
      - ./config:/app/config:ro
      - ./.ssh:/home/claude/.ssh:ro
      - ./.ssh/netrc:/home/claude/.netrc:ro
    ports:
      - "${AGENT_THREE_PORT:-8082}:8080"
      - "${AGENT_THREE_METRICS_PORT:-9093}:9090"  # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - claude-network
    deploy:
      resources:
        limits:
          cpus: ${AGENT_THREE_CPU_LIMIT:-2}
          memory: ${AGENT_THREE_MEMORY_LIMIT:-4G}

  # ===========================================================================
  # Redis Cache & Pub/Sub (multi-agent profile)
  # ===========================================================================
  redis:
    profiles: ["multi-agent"]
    image: redis:7-alpine
    container_name: claude-redis
    hostname: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # OpenTelemetry Collector
  # Bridges native OTLP signals from the Claude Agent SDK (gated by
  # CLAUDE_CODE_ENABLE_TELEMETRY=1 in agent containers) into Prometheus.
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.119.0}
    container_name: claude-otel-collector
    hostname: otel-collector
    command: ["--config=/etc/otel-collector/otel-collector.yml"]
    volumes:
      - ./config/monitoring/otel-collector.yml:/etc/otel-collector/otel-collector.yml:ro
    ports:
      # OTLP ingest exposed on host so non-containerized agents can send signals.
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC receiver
      - "${OTEL_HTTP_PORT:-4318}:4318"   # OTLP HTTP receiver
      # 8888 (collector self-metrics) and 8889 (SDK metrics for prometheus) are
      # NOT mapped to the host — they're scraped by prometheus over the docker
      # network. Avoids port conflicts with common host services (Jupyter
      # frequently uses 8888). Use `docker compose exec` or the prometheus UI
      # at http://localhost:9090 to inspect metrics from the host.
    restart: unless-stopped
    networks:
      - claude-network
    # Note: otelcol-contrib is distroless — no shell, wget, or curl — so a
    # standard docker healthcheck cannot probe the :13133 health_check endpoint.
    # Liveness is observable via Prometheus' scrape of :8888 (otel-collector-self
    # job in prometheus.yml) and the collector's startup logs.

  # ===========================================================================
  # Prometheus Monitoring
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: claude-prometheus
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alerting.yml:/etc/prometheus/alerting.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # AlertManager — routes Prometheus alerts to receivers
  # ===========================================================================
  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_VERSION:-v0.27.0}
    container_name: claude-alertmanager
    hostname: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:${ALERTMANAGER_PORT:-9093}'
    volumes:
      - ./config/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      alertmanager-webhook:
        condition: service_started
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # AlertManager debug webhook receiver — logs payloads to stdout for dev.
  # Replace with a real receiver (Slack, PagerDuty, email) for production.
  # ===========================================================================
  alertmanager-webhook:
    image: python:3.12-alpine
    container_name: claude-alertmanager-webhook
    hostname: alertmanager-webhook
    command: ["python", "/app/webhook_debug.py"]
    volumes:
      - ./config/monitoring/alertmanager_webhook_debug.py:/app/webhook_debug.py:ro
    ports:
      - "${ALERTMANAGER_WEBHOOK_PORT:-9099}:5001"
    restart: unless-stopped
    networks:
      - claude-network

  # ===========================================================================
  # Grafana Dashboards
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: claude-grafana
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_PORT:-3000}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./config/monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/monitoring/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
