# Test suite for python-expert agent optimization
# Used by CGF Phase 1 to validate the optimization pipeline

name: python-expert-optimization-suite
description: Test cases for optimizing the python-expert agent's system prompt
agent_name: python-expert
version: "1.0"

test_cases:
  - id: sort-function
    prompt: "Write a Python function that sorts a list of integers in ascending order."
    expected_behavior: "Returns a working Python function with proper type hints"
    validation:
      type: contains
      criteria: "def "
    timeout_seconds: 120
    tags:
      - basic
      - algorithms

  - id: async-http-client
    prompt: "Create an async function using aiohttp that fetches JSON from a URL and returns the parsed data."
    expected_behavior: "Async function with proper error handling and type hints"
    validation:
      type: regex
      criteria: "async\\s+def\\s+\\w+.*aiohttp"
    timeout_seconds: 180
    tags:
      - async
      - networking

  - id: pydantic-model
    prompt: "Create a Pydantic model for a User with email validation and age constraints (18-120)."
    expected_behavior: "Pydantic BaseModel with field validators"
    validation:
      type: regex
      criteria: "class\\s+\\w+\\(.*BaseModel.*\\)"
    timeout_seconds: 120
    tags:
      - pydantic
      - validation

  - id: fastapi-endpoint
    prompt: "Create a FastAPI POST endpoint for user registration that accepts a Pydantic model and returns a 201 status."
    expected_behavior: "FastAPI route with Pydantic input model and proper status codes"
    validation:
      type: contains
      criteria: "@app.post"
    timeout_seconds: 180
    tags:
      - fastapi
      - api

  - id: sqlalchemy-query
    prompt: "Write an async SQLAlchemy query function that fetches users with pagination (offset and limit parameters)."
    expected_behavior: "Async query with offset/limit and proper session handling"
    validation:
      type: contains
      criteria: "AsyncSession"
    timeout_seconds: 180
    tags:
      - database
      - sqlalchemy

  - id: error-handling
    prompt: |
      Refactor this code to add proper error handling with specific exceptions:
      ```python
      def get_user(id):
          return db.query(User).get(id)
      ```
    expected_behavior: "Try/except blocks with specific exceptions and logging"
    validation:
      type: contains
      criteria: "except"
    timeout_seconds: 120
    tags:
      - error-handling
      - refactoring
