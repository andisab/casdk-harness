instructions: |
  You are a NextJS expert focused on modern App Router patterns and best practices.
  
  Core principles:
  - **Server-First**: Default to Server Components, use Client Components intentionally
  - **Type Safety**: TypeScript throughout with proper inference
  - **Performance**: Optimize bundle size, lazy loading, and Core Web Vitals
  - **Accessibility**: WCAG 2.1 AA compliance, semantic HTML, ARIA when needed
  - **SEO**: Proper metadata, structured data, Open Graph tags
  - **Error Handling**: Error boundaries, loading states, suspense boundaries
  
  App structure:
  ```
  app/
  ├── (auth)/                    # Route groups
  │   ├── login/
  │   └── register/
  ├── (dashboard)/
  │   ├── layout.tsx            # Nested layouts
  │   ├── page.tsx              # Server Component
  │   └── projects/
  │       ├── [id]/             # Dynamic routes
  │       │   ├── page.tsx
  │       │   └── loading.tsx
  │       └── page.tsx
  ├── api/                      # Route handlers
  │   ├── auth/[...nextauth]/
  │   └── trpc/[trpc]/
  ├── layout.tsx                # Root layout
  ├── page.tsx                  # Home page
  ├── error.tsx                 # Error boundary
  ├── not-found.tsx            # 404 page
  └── global.css               # Global styles
  
  components/
  ├── ui/                       # UI components
  │   ├── button.tsx
  │   └── card.tsx
  ├── forms/                    # Form components
  └── layouts/                  # Layout components
  
  lib/
  ├── auth.ts                   # Auth configuration
  ├── db.ts                     # Database client
  ├── api.ts                    # API utilities
  └── utils.ts                  # Utility functions
  ```
  
  Data fetching patterns:
  - Use fetch with caching strategies in Server Components
  - Parallel data fetching with Promise.all
  - Streaming with Suspense for progressive rendering
  - Server Actions for forms and mutations
  - TanStack Query for client-side state
  
  Component patterns:
  - Composition over inheritance
  - Compound components for complex UI
  - Render props and custom hooks for logic reuse
  - Forward refs for component libraries
  
  Performance optimization:
  - Dynamic imports for code splitting
  - Image optimization with next/image
  - Font optimization with next/font
  - Prefetching with next/link
  - Static generation where possible
  
templates:
  - trigger: "create nextjs page with data"
    description: "Generate NextJS page with data fetching and metadata"
    template: |
      ```typescript
      import { Metadata } from 'next';
      import { notFound } from 'next/navigation';
      import { Suspense } from 'react';
      
      interface PageProps {
        params: { id: string };
        searchParams: { [key: string]: string | string[] | undefined };
      }
      
      // Generate metadata for SEO
      export async function generateMetadata(
        { params }: PageProps
      ): Promise<Metadata> {
        const item = await getItem(params.id);
        
        if (!item) {
          return { title: 'Not Found' };
        }
        
        return {
          title: item.title,
          description: item.description,
          openGraph: {
            title: item.title,
            description: item.description,
            images: [{ url: item.image }],
          },
        };
      }
      
      // Static params for SSG (optional)
      export async function generateStaticParams() {
        const items = await getTopItems();
        return items.map((item) => ({
          id: item.id,
        }));
      }
      
      async function getItem(id: string) {
        const res = await fetch(`${process.env.API_URL}/api/items/${id}`, {
          next: { 
            revalidate: 60, // ISR: revalidate every 60 seconds
            tags: [`item-${id}`], // For on-demand revalidation
          },
        });
        
        if (!res.ok) return null;
        return res.json();
      }
      
      async function getRelatedItems(id: string) {
        const res = await fetch(`${process.env.API_URL}/api/items/${id}/related`, {
          next: { revalidate: 300 },
        });
        
        if (!res.ok) return [];
        return res.json();
      }
      
      // Loading component for Suspense
      function RelatedItemsSkeleton() {
        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {[1, 2, 3].map((i) => (
              <div key={i} className="h-48 bg-gray-200 animate-pulse rounded-lg" />
            ))}
          </div>
        );
      }
      
      // Async component for related items
      async function RelatedItems({ id }: { id: string }) {
        const items = await getRelatedItems(id);
        
        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {items.map((item: any) => (
              <div key={item.id} className="p-4 border rounded-lg">
                <h3 className="font-semibold">{item.title}</h3>
                <p className="text-gray-600">{item.description}</p>
              </div>
            ))}
          </div>
        );
      }
      
      export default async function Page({ params, searchParams }: PageProps) {
        const item = await getItem(params.id);
        
        if (!item) {
          notFound();
        }
        
        return (
          <main className="container mx-auto px-4 py-8">
            <article>
              <h1 className="text-4xl font-bold mb-4">{item.title}</h1>
              <p className="text-lg text-gray-600 mb-8">{item.description}</p>
              
              <div className="prose max-w-none mb-12">
                {item.content}
              </div>
            </article>
            
            <section>
              <h2 className="text-2xl font-bold mb-4">Related Items</h2>
              <Suspense fallback={<RelatedItemsSkeleton />}>
                <RelatedItems id={params.id} />
              </Suspense>
            </section>
          </main>
        );
      }
      ```
      
  - trigger: "create server action form"
    description: "Generate form with Server Actions for mutations"
    template: |
      ```typescript
      'use server';
      
      import { revalidatePath, revalidateTag } from 'next/cache';
      import { redirect } from 'next/navigation';
      import { z } from 'zod';
      
      // Schema validation
      const CreateItemSchema = z.object({
        title: z.string().min(1).max(100),
        description: z.string().max(1000).optional(),
        price: z.coerce.number().positive().max(1000000),
        categoryId: z.string().uuid(),
      });
      
      export type State = {
        errors?: {
          title?: string[];
          description?: string[];
          price?: string[];
          categoryId?: string[];
        };
        message?: string;
      };
      
      export async function createItem(
        prevState: State,
        formData: FormData
      ): Promise<State> {
        // Validate form data
        const validatedFields = CreateItemSchema.safeParse({
          title: formData.get('title'),
          description: formData.get('description'),
          price: formData.get('price'),
          categoryId: formData.get('categoryId'),
        });
        
        if (!validatedFields.success) {
          return {
            errors: validatedFields.error.flatten().fieldErrors,
            message: 'Invalid fields. Failed to create item.',
          };
        }
        
        const { title, description, price, categoryId } = validatedFields.data;
        
        try {
          // Create item in database
          const response = await fetch(`${process.env.API_URL}/api/items`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, price, categoryId }),
          });
          
          if (!response.ok) {
            throw new Error('Failed to create item');
          }
          
          const item = await response.json();
          
          // Revalidate cache
          revalidateTag('items');
          revalidatePath('/items');
          
          // Redirect to new item
          redirect(`/items/${item.id}`);
        } catch (error) {
          return {
            message: 'Database Error: Failed to create item.',
          };
        }
      }
      
      // Client Component for the form
      'use client';
      
      import { useFormState, useFormStatus } from 'react-dom';
      import { createItem } from './actions';
      
      function SubmitButton() {
        const { pending } = useFormStatus();
        
        return (
          <button
            type="submit"
            disabled={pending}
            className="px-4 py-2 bg-blue-600 text-white rounded-lg disabled:opacity-50"
          >
            {pending ? 'Creating...' : 'Create Item'}
          </button>
        );
      }
      
      export function CreateItemForm() {
        const initialState: State = { message: '', errors: {} };
        const [state, dispatch] = useFormState(createItem, initialState);
        
        return (
          <form action={dispatch} className="space-y-4">
            <div>
              <label htmlFor="title" className="block text-sm font-medium mb-1">
                Title
              </label>
              <input
                id="title"
                name="title"
                type="text"
                required
                className="w-full px-3 py-2 border rounded-lg"
                aria-describedby="title-error"
              />
              {state.errors?.title && (
                <p id="title-error" className="text-red-500 text-sm mt-1">
                  {state.errors.title.join(', ')}
                </p>
              )}
            </div>
            
            <div>
              <label htmlFor="description" className="block text-sm font-medium mb-1">
                Description
              </label>
              <textarea
                id="description"
                name="description"
                rows={3}
                className="w-full px-3 py-2 border rounded-lg"
                aria-describedby="description-error"
              />
              {state.errors?.description && (
                <p id="description-error" className="text-red-500 text-sm mt-1">
                  {state.errors.description.join(', ')}
                </p>
              )}
            </div>
            
            <div>
              <label htmlFor="price" className="block text-sm font-medium mb-1">
                Price
              </label>
              <input
                id="price"
                name="price"
                type="number"
                step="0.01"
                required
                className="w-full px-3 py-2 border rounded-lg"
                aria-describedby="price-error"
              />
              {state.errors?.price && (
                <p id="price-error" className="text-red-500 text-sm mt-1">
                  {state.errors.price.join(', ')}
                </p>
              )}
            </div>
            
            {state.message && (
              <p className="text-red-500 text-sm">{state.message}</p>
            )}
            
            <SubmitButton />
          </form>
        );
      }
      ```