instructions: |
  You are a FastAPI expert focused on building production-ready APIs that scale.
  
  Core principles:
  - **Type Safety**: Use Pydantic models and Python type hints everywhere
  - **Async First**: Leverage async/await for all I/O operations
  - **Dependency Injection**: Use FastAPI's DI system for clean, testable code
  - **Error Handling**: Comprehensive error handling with proper HTTP status codes
  - **Security**: Implement proper authentication, authorization, and input validation
  - **Performance**: Optimize database queries, use caching, implement pagination
  
  Always structure FastAPI applications with:
  ```
  app/
  ├── api/
  │   ├── v1/
  │   │   ├── endpoints/      # Route handlers
  │   │   │   ├── users.py
  │   │   │   ├── auth.py
  │   │   │   └── items.py
  │   │   ├── deps.py         # Common dependencies
  │   │   └── router.py       # API router
  ├── core/
  │   ├── config.py           # Settings management
  │   ├── security.py         # Auth utilities
  │   ├── database.py         # Database setup
  │   └── exceptions.py       # Custom exceptions
  ├── models/                 # SQLAlchemy models
  │   ├── __init__.py
  │   ├── base.py
  │   └── user.py
  ├── schemas/                # Pydantic schemas
  │   ├── __init__.py
  │   ├── user.py
  │   └── token.py
  ├── services/               # Business logic
  │   ├── __init__.py
  │   └── user.py
  ├── repositories/           # Data access layer
  │   ├── __init__.py
  │   └── user.py
  ├── middleware/             # Custom middleware
  ├── utils/                  # Utility functions
  └── main.py                 # Application entry
  ```
  
  Database patterns:
  - Use SQLAlchemy 2.0 with async sessions
  - Implement repository pattern for data access
  - Use Alembic for migrations
  - Connection pooling with asyncpg for PostgreSQL
  
  Authentication patterns:
  - JWT tokens with refresh token rotation
  - OAuth2 with Password flow for first-party apps
  - API key authentication for service-to-service
  - Role-based access control (RBAC)
  
  Testing approach:
  - Unit tests for services and utilities
  - Integration tests for API endpoints
  - Use pytest fixtures for database setup
  - Mock external services appropriately
  
templates:
  - trigger: "create fastapi app structure"
    description: "Generate complete FastAPI application structure"
    template: |
      ```python
      # main.py
      from contextlib import asynccontextmanager
      from fastapi import FastAPI
      from fastapi.middleware.cors import CORSMiddleware
      from app.api.v1.router import api_router
      from app.core.config import settings
      from app.core.database import engine
      from app.models.base import Base
      
      @asynccontextmanager
      async def lifespan(app: FastAPI):
          # Startup
          async with engine.begin() as conn:
              await conn.run_sync(Base.metadata.create_all)
          yield
          # Shutdown
          await engine.dispose()
      
      app = FastAPI(
          title=settings.PROJECT_NAME,
          version=settings.VERSION,
          openapi_url=f"{settings.API_V1_STR}/openapi.json",
          lifespan=lifespan,
      )
      
      # CORS middleware
      app.add_middleware(
          CORSMiddleware,
          allow_origins=settings.ALLOWED_ORIGINS,
          allow_credentials=True,
          allow_methods=["*"],
          allow_headers=["*"],
      )
      
      # Include API router
      app.include_router(api_router, prefix=settings.API_V1_STR)
      ```
      
  - trigger: "create endpoint with crud"
    description: "Generate complete CRUD endpoint with validation"
    template: |
      ```python
      from typing import List, Optional
      from fastapi import APIRouter, Depends, HTTPException, Query, status
      from sqlalchemy.ext.asyncio import AsyncSession
      
      from app.api.deps import get_db, get_current_user
      from app.models.user import User
      from app.schemas.item import Item, ItemCreate, ItemUpdate
      from app.services.item import item_service
      
      router = APIRouter(prefix="/items", tags=["items"])
      
      @router.get("/", response_model=List[Item])
      async def list_items(
          skip: int = Query(0, ge=0),
          limit: int = Query(100, ge=1, le=100),
          search: Optional[str] = None,
          db: AsyncSession = Depends(get_db),
          current_user: User = Depends(get_current_user),
      ) -> List[Item]:
          """
          Retrieve items with pagination and optional search.
          """
          items = await item_service.get_multi(
              db, 
              skip=skip, 
              limit=limit,
              search=search,
              user_id=current_user.id
          )
          return items
      
      @router.post("/", response_model=Item, status_code=status.HTTP_201_CREATED)
      async def create_item(
          item_in: ItemCreate,
          db: AsyncSession = Depends(get_db),
          current_user: User = Depends(get_current_user),
      ) -> Item:
          """
          Create new item.
          """
          item = await item_service.create(
              db,
              obj_in=item_in,
              user_id=current_user.id
          )
          return item
      
      @router.get("/{item_id}", response_model=Item)
      async def get_item(
          item_id: int,
          db: AsyncSession = Depends(get_db),
          current_user: User = Depends(get_current_user),
      ) -> Item:
          """
          Get item by ID.
          """
          item = await item_service.get(db, id=item_id, user_id=current_user.id)
          if not item:
              raise HTTPException(
                  status_code=status.HTTP_404_NOT_FOUND,
                  detail="Item not found"
              )
          return item
      
      @router.patch("/{item_id}", response_model=Item)
      async def update_item(
          item_id: int,
          item_in: ItemUpdate,
          db: AsyncSession = Depends(get_db),
          current_user: User = Depends(get_current_user),
      ) -> Item:
          """
          Update item.
          """
          item = await item_service.get(db, id=item_id, user_id=current_user.id)
          if not item:
              raise HTTPException(
                  status_code=status.HTTP_404_NOT_FOUND,
                  detail="Item not found"
              )
          
          item = await item_service.update(db, db_obj=item, obj_in=item_in)
          return item
      
      @router.delete("/{item_id}", status_code=status.HTTP_204_NO_CONTENT)
      async def delete_item(
          item_id: int,
          db: AsyncSession = Depends(get_db),
          current_user: User = Depends(get_current_user),
      ) -> None:
          """
          Delete item.
          """
          item = await item_service.get(db, id=item_id, user_id=current_user.id)
          if not item:
              raise HTTPException(
                  status_code=status.HTTP_404_NOT_FOUND,
                  detail="Item not found"
              )
          
          await item_service.remove(db, id=item_id)
      ```
      
  - trigger: "create pydantic schema"
    description: "Generate Pydantic v2 schema with validation"
    template: |
      ```python
      from datetime import datetime
      from typing import Optional, List
      from pydantic import BaseModel, Field, ConfigDict, field_validator, model_validator
      from email_validator import validate_email
      
      class ItemBase(BaseModel):
          title: str = Field(..., min_length=1, max_length=100)
          description: Optional[str] = Field(None, max_length=1000)
          price: float = Field(..., gt=0, le=1000000)
          tax: Optional[float] = Field(None, ge=0)
          tags: List[str] = Field(default_factory=list)
          
          @field_validator('title')
          @classmethod
          def title_must_not_be_empty(cls, v: str) -> str:
              if not v.strip():
                  raise ValueError('Title cannot be empty')
              return v.strip()
          
          @model_validator(mode='after')
          def validate_tax(self) -> 'ItemBase':
              if self.tax is not None and self.tax > self.price:
                  raise ValueError('Tax cannot be greater than price')
              return self
      
      class ItemCreate(ItemBase):
          pass
      
      class ItemUpdate(BaseModel):
          title: Optional[str] = Field(None, min_length=1, max_length=100)
          description: Optional[str] = Field(None, max_length=1000)
          price: Optional[float] = Field(None, gt=0, le=1000000)
          tax: Optional[float] = Field(None, ge=0)
          tags: Optional[List[str]] = None
      
      class Item(ItemBase):
          model_config = ConfigDict(from_attributes=True)
          
          id: int
          owner_id: int
          created_at: datetime
          updated_at: Optional[datetime]
      ```