# =============================================================================
# Development Override Configuration
# =============================================================================
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  main-agent:
    build:
      target: development
    environment:
      - DEBUG=${DEBUG:-false}
      - HOT_RELOAD=${HOT_RELOAD:-true}
      - ENABLE_PROFILING=${ENABLE_PROFILING:-false}
    # Enable debugging port
    ports:
      - "5678:5678"  # Python debugger
    # Override command for development - keep container alive for interactive sessions
    # Use 'make interactive' to start a session
    command: tail -f /dev/null
    # Volume mounts for live code reload
    volumes:
      - ./src:/app/src:delegated
      - ./tests:/app/tests:delegated
    # Watch mode for file sync (used by 'make dev')
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tests
          target: /app/tests

  agent-two:
    build:
      target: development
    environment:
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./src:/app/src:delegated
      - ./tests:/app/tests:delegated
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src

  agent-three:
    build:
      target: development
    environment:
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./src:/app/src:delegated
      - ./tests:/app/tests:delegated
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src

  # Development redis with exposed port
  redis:
    ports:
      - "6379:6379"
