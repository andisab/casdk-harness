# =============================================================================
# Development Override Configuration
# =============================================================================
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  main-agent:
    build:
      target: development
    environment:
      - DEBUG=${DEBUG:-true}
      - HOT_RELOAD=${HOT_RELOAD:-true}
      - ENABLE_PROFILING=${ENABLE_PROFILING:-false}
    # Enable debugging port
    ports:
      - "5678:5678"  # Python debugger
    # Override command for development - keep container alive for interactive sessions
    # Use 'make interactive' to start a session
    command: tail -f /dev/null
    # Watch mode for automatic reload (Docker Compose 2.22+)
    # Note: Paths watched here should NOT be in volumes: section
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tests
          target: /app/tests
        - action: rebuild
          path: ./pyproject.toml
        - action: sync+restart
          path: ./config
          target: /app/config

  reviewer-agent:
    build:
      target: development
    environment:
      - DEBUG=${DEBUG:-true}
    # Watch mode for automatic reload
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tests
          target: /app/tests

  tester-agent:
    build:
      target: development
    environment:
      - DEBUG=${DEBUG:-true}
    # Watch mode for automatic reload
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tests
          target: /app/tests

  # Development database with exposed port
  postgres:
    ports:
      - "5432:5432"

  # Development redis with exposed port
  redis:
    ports:
      - "6379:6379"
